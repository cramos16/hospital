<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appointments — Hopewell Clinic</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="brand">Hopewell Clinic</a>
        <nav class="main-nav">
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="doctors.html">Doctors</a>
          <a href="appointments.html" class="active">Appointments</a>
          <a href="contact.html">Contact</a>
        </nav>
        <button class="nav-toggle">☰</button>
      </div>
    </header>

    <main class="container">
      <h1>Book an Appointment</h1>
      <p>If this is an emergency, call <strong>911</strong> immediately.</p>

      <form class="appointment-form" onsubmit="return submitForm(event)">
        <label>Full Name <input required type="text" /></label>
        <label>Email <input required type="email" /></label>
        <label>Phone <input required type="tel" /></label>

        <label
          >Service
          <select required>
            <option value="">Select service</option>
            <option>Primary Care</option>
            <option>Pediatrics</option>
            <option>Women's Health</option>
            <option>Lab Work</option>
            <option>Mental Health</option>
          </select>
        </label>

        <label>Date <input type="date" required /></label>
        <label>Preferred Time <input type="time" /></label>
        <label>Notes <textarea rows="4"></textarea></label>

        <button class="btn">Submit Request</button>
        <p id="form-message" class="muted"></p>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© Hopewell Clinic</p>
      </div>
    </footer>

    <script>
      function submitForm(e) {
        e.preventDefault();
        document.getElementById("form-message").textContent =
          "Your request has been submitted. We will contact you soon!";
      }
    </script>

    <script>
      const toggle = document.querySelector(".nav-toggle");
      const nav = document.querySelector(".main-nav");
      toggle.onclick = () => nav.classList.toggle("open");
    </script>
  </body>
</html>
